<svg xmlns="http://www.w3.org/2000/svg" width="480" height="440" viewBox="0 0 480 440" fill="none" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="heroGrad" x1="60" y1="40" x2="420" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="55%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="60" y1="40" x2="420" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.22"/>
    </linearGradient>
    <marker id="heroArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- glow backdrop -->
  <circle cx="240" cy="220" r="200" fill="url(#heroGlow)"/>

  <!-- orbit ring -->
  <circle cx="240" cy="220" r="150" stroke="url(#heroGrad)" stroke-width="2" stroke-dasharray="4 8" opacity="0.6"/>

  <!-- center brain -->
  <circle cx="240" cy="220" r="74" fill="#0f172a"/>
  <circle cx="240" cy="220" r="74" stroke="url(#heroGrad)" stroke-width="3"/>
  <g transform="translate(192 172) scale(4)" stroke="url(#heroGrad)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 18V5"/>
    <path d="M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4"/>
    <path d="M17.598 6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5"/>
    <path d="M17.997 5.125a4 4 0 0 1 2.526 5.77"/>
    <path d="M18 18a4 4 0 0 0 2-7.464"/>
    <path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517"/>
    <path d="M6 18a4 4 0 0 1-2-7.464"/>
    <path d="M6.003 5.125a4 4 0 0 0-2.526 5.77"/>
  </g>

  <!-- satellite: remember (top) -->
  <g>
    <rect x="170" y="18" width="140" height="46" rx="12" fill="#172554" stroke="#2563eb" stroke-width="2"/>
    <text x="240" y="38" text-anchor="middle" fill="#bfdbfe" font-size="13" font-weight="700">dim remember</text>
    <text x="240" y="55" text-anchor="middle" fill="#60a5fa" font-size="11">claims from you &amp; agents</text>
  </g>

  <!-- satellite: verify (right) -->
  <g>
    <rect x="340" y="197" width="132" height="46" rx="12" fill="#052e2b" stroke="#10b981" stroke-width="2"/>
    <text x="406" y="217" text-anchor="middle" fill="#a7f3d0" font-size="13" font-weight="700">dim verify ✓</text>
    <text x="406" y="234" text-anchor="middle" fill="#34d399" font-size="11">evidence re-checked</text>
  </g>

  <!-- satellite: stale flag (bottom) -->
  <g>
    <rect x="170" y="376" width="140" height="46" rx="12" fill="#3b1d0e" stroke="#f59e0b" stroke-width="2"/>
    <text x="240" y="396" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="700">stale? flagged ⚠</text>
    <text x="240" y="413" text-anchor="middle" fill="#fbbf24" font-size="11">never trust old facts</text>
  </g>

  <!-- satellite: deliver (left) -->
  <g>
    <rect x="8" y="197" width="132" height="46" rx="12" fill="#082f49" stroke="#06b6d4" stroke-width="2"/>
    <text x="74" y="217" text-anchor="middle" fill="#a5f3fc" font-size="13" font-weight="700">→ your AI tools</text>
    <text x="74" y="234" text-anchor="middle" fill="#22d3ee" font-size="11">MCP · CLAUDE.md</text>
  </g>

  <!-- connectors -->
  <path d="M240 66v46" stroke="#2563eb" stroke-width="2.5" marker-end="url(#heroArrow)"/>
  <path d="M338 220h-22" stroke="#10b981" stroke-width="2.5" marker-end="url(#heroArrow)"/>
  <path d="M240 374v-46" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#heroArrow)"/>
  <path d="M164 220h-22" stroke="#06b6d4" stroke-width="2.5" marker-end="url(#heroArrow)"/>
</svg>

