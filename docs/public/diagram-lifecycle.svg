<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" fill="none" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="lcArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="330" rx="16" fill="#0f172a"/>
  <text x="440" y="36" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="800">The life of a memory</text>

  <!-- Proposal -->
  <g>
    <rect x="36" y="120" width="160" height="72" rx="14" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
    <text x="116" y="150" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="800">Proposal</text>
    <text x="116" y="172" text-anchor="middle" fill="#94a3b8" font-size="11">waiting in review queue</text>
  </g>

  <!-- Approved / unverified -->
  <g>
    <rect x="258" y="120" width="170" height="72" rx="14" fill="#172554" stroke="#2563eb" stroke-width="2"/>
    <text x="343" y="150" text-anchor="middle" fill="#bfdbfe" font-size="14" font-weight="800">Memory</text>
    <text x="343" y="172" text-anchor="middle" fill="#93c5fd" font-size="11">approved, not yet verified</text>
  </g>

  <!-- Verified -->
  <g>
    <rect x="500" y="52" width="170" height="72" rx="14" fill="#052e2b" stroke="#10b981" stroke-width="2"/>
    <text x="585" y="82" text-anchor="middle" fill="#a7f3d0" font-size="14" font-weight="800">Verified ✓</text>
    <text x="585" y="104" text-anchor="middle" fill="#34d399" font-size="11">evidence passes · ranked first</text>
  </g>

  <!-- Stale -->
  <g>
    <rect x="500" y="188" width="170" height="72" rx="14" fill="#3b1d0e" stroke="#f59e0b" stroke-width="2"/>
    <text x="585" y="218" text-anchor="middle" fill="#fde68a" font-size="14" font-weight="800">Stale ⚠</text>
    <text x="585" y="240" text-anchor="middle" fill="#fbbf24" font-size="11">evidence fails · demoted</text>
  </g>

  <!-- Pinned -->
  <g>
    <rect x="726" y="52" width="128" height="72" rx="14" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="2"/>
    <text x="790" y="82" text-anchor="middle" fill="#bae6fd" font-size="14" font-weight="800">Pinned 📌</text>
    <text x="790" y="104" text-anchor="middle" fill="#38bdf8" font-size="11">never expires</text>
  </g>

  <!-- Forgotten -->
  <g>
    <rect x="726" y="188" width="128" height="72" rx="14" fill="#27272a" stroke="#52525b" stroke-width="2"/>
    <text x="790" y="218" text-anchor="middle" fill="#d4d4d8" font-size="14" font-weight="800">Forgotten</text>
    <text x="790" y="240" text-anchor="middle" fill="#a1a1aa" font-size="11">refuted or replaced</text>
  </g>

  <!-- arrows -->
  <path d="M196 156h56" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#lcArrow)"/>
  <text x="224" y="146" text-anchor="middle" fill="#94a3b8" font-size="11">dim review</text>

  <path d="M428 148c30-25 40-40 66-52" stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#lcArrow)"/>
  <text x="452" y="106" text-anchor="middle" fill="#34d399" font-size="11">verify passes</text>

  <path d="M428 168c30 25 40 40 66 52" stroke="#f59e0b" stroke-width="2.5" fill="none" marker-end="url(#lcArrow)"/>
  <text x="452" y="216" text-anchor="middle" fill="#fbbf24" font-size="11">verify fails</text>

  <!-- verified <-> stale -->
  <path d="M578 124c-6 22-6 42 0 62" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#lcArrow)"/>
  <path d="M594 186c6-22 6-42 0-62" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#lcArrow)"/>
  <text x="622" y="160" text-anchor="middle" fill="#94a3b8" font-size="11">re-verify</text>

  <path d="M670 88h50" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#lcArrow)"/>
  <text x="695" y="78" text-anchor="middle" fill="#38bdf8" font-size="11">dim pin</text>

  <path d="M670 224h50" stroke="#52525b" stroke-width="2.5" marker-end="url(#lcArrow)"/>
  <text x="695" y="214" text-anchor="middle" fill="#a1a1aa" font-size="11">dim forget</text>

  <!-- stale replacement proposal loop back -->
  <path d="M500 250c-160 60-360 40-386-52" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 5" fill="none" marker-end="url(#lcArrow)"/>
  <text x="300" y="304" text-anchor="middle" fill="#94a3b8" font-size="11">stale memories auto-draft replacement proposals</text>
</svg>

