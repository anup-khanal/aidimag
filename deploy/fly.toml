# Fly.io config for the aidimag sync server.
# Usage: fly launch --copy-config --no-deploy && fly volumes create aidimag_data --size 1
#        fly secrets set AIDIMAG_SYNC_TOKEN=$(openssl rand -hex 32) && fly deploy
app = "aidimag-sync"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "aidimag_data"
  destination = "/data"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

